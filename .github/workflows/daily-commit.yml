name: Ultimate Contribution Generator
on:
  push:
    branches: [ main ]
  schedule:
    # Runs 6 times a day (every 4 hours)
    - cron: '0 */4 * * *' 
  workflow_dispatch:

jobs:
  make-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Daily and Previous Day Commits
        run: |
          git config --global user.name "ahmadullahmukhlis"
          git config --global user.email "nasarimukhlis@gmail.com"

          # Function to generate commits for a specific date
          make_commits() {
            local target_date=$1
            local count=$2
            export GIT_AUTHOR_DATE="$target_date 12:00:00"
            export GIT_COMMITTER_DATE="$target_date 12:00:00"
            
            for ((i=1; i<=count; i++))
            do
              echo "Commit $i for $target_date - $(date)" >> history_log.txt
              git add history_log.txt
              git commit -m "Contribution $i for $target_date [skip ci]"
            done
          }

          # 1. Commit 75 times for Yesterday
          YESTERDAY=$(date -I -d "1 day ago")
          make_commits "$YESTERDAY" 75

          # 2. Commit 75 times for Today
          TODAY=$(date -I)
          make_commits "$TODAY" 75

          # Push the total 150 commits
          git push origin main
